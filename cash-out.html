<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- daisyui link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- daisyUi theme link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- Font Awesome Link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- FavIcon Link  -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <title>Payoo | Home</title>


    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen mx-auto bg-base-100">
    <header class="flex justify-between items-center w-11/12 mx-auto py-5 border-b-2 border-gray-300">
        <div class="flex gap-1">
            <div class="logo w-[60px]">
                <img src="./assets/logo.png" alt="">
            </div>

            <div class="available-balance">
                <h3 class="text-xl font-bold">$<span id="balance">45000</span></h3>
                <p class="text-neutral/50">Available Balance</p>
            </div>
        </div>

        <div>
            <a class="btn btn-soft text-neutral/50" href="index.html">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                Logout
            </a>
        </div>
    </header>

    <!-- hero section  -->
    <section class="w-11/12 mx-auto py-16 space-y-5">
        <div class="space-y-5">
            <h2 class="text-neutral font-bold text-3xl">Welcome to Pay<span class="text-primary">oo</span></h2>

            <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and
            </p>
        </div>

        <!-- buttons container -->
        <div class="grid grid-cols-3 gap-4">
            <a href="add-money.html" class="btn btn-primary btn-soft w-full flex-col py-10">
                <img src="./assets/opt-1.png" alt="">
                <p class="text-neutral/50">Add Money</p>
            </a>

            <a href="cash-out.html" class="btn btn-primary w-full flex-col py-10">
                <img src="./assets/opt-2.png" alt="">
                <p class="text-base-100">Cash Out</p>
            </a>

            <a href="transfer-money.html" class="btn btn-primary btn-soft w-full flex-col py-10">
                <img src="./assets/opt-3.png" alt="">
                <p class="text-neutral/50">Transfer Money</p>
            </a>

            <a href="get-bonuses.html" class="btn btn-primary btn-soft w-full flex-col py-10">
                <img src="./assets/opt-4.png" alt="">
                <p class="text-neutral/50">Get Bonuses</p>
            </a>

            <a href="pay-bill.html" class="btn btn-primary btn-soft w-full flex-col py-10">
                <img src="./assets/opt-5.png" alt="">
                <p class="text-neutral/50">Pay Bill</p>
            </a>

            <a href="transactions.html" class="btn btn-primary btn-soft w-full flex-col py-10">
                <img src="./assets/opt-6.png" alt="">
                <p class="text-neutral/50">Transactions</p>
            </a>
        </div>
    </section>

    <!-- Cash Out form  -->
    <div class="card bg-base-100 w-11/12 shadow mx-auto">
        <div class="card-body">
            <h3 class="text-neutral font-bold text-lg mb-5">Cash Out</h3>
            <fieldset class="fieldset">
                <label class="label text-neutral/70 text-base font-bold">Agent Number</label>
                <input id="login-input-number" type="text" maxlength="11" minlength="11"
                    class="w-full input rounded-full bg-base-200" placeholder="Enter agent number" />

                <br>

                <label class="label text-neutral/70 text-base font-bold">Amount</label>
                <input id="login-input-number" type="text" maxlength="11" minlength="11" class="w-full input rounded-full bg-base-200"
                    placeholder="Enter amount to withdraw" />
                
                <br>

                <label class="label text-neutral/70 text-base font-bold">Pin Number</label>
                <input id="login-input-pin" type="password" maxlength="4" class="w-full input rounded-full bg-base-200"
                    placeholder="Enter 4 digit pin number" />
                <button id="btn-cashout" class="btn btn-primary mt-4 rounded-full">Withdraw Money</button>
            </fieldset>
        </div>
    </div>
    
</body>

</html>
