<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- daisyui link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- daisyUi theme link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- Font Awesome Link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

        <!-- google font link  -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- FavIcon Link  -->
     <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <title>Payoo | Login</title>


    <style>
        *{
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-base-200">
    <div class="w-[200px] mx-auto pt-20">
        <img src="./assets/Logo-full.png" alt="">
    </div>

    <!-- Register form  -->
    <div id="register-form" class="card bg-base-100 w-11/12 shadow mt-20 mx-auto">
        <h3 class="text-lg text-neutral/90 font-bold">Register</h3>
        <div class="card-body">
            <fieldset class="fieldset">
                <label class="label text-neutral text-base font-bold">Mobile Number</label>
                <input id="login-input-number" type="text" maxlength="11" minlength="11"
                    class="w-full input rounded-full bg-base-200" placeholder="Enter your number" />
                <br>
                <label class="label text-neutral text-base font-bold">4 digit pin</label>
                <input id="login-input-pin" type="password" maxlength="4" class="w-full input rounded-full bg-base-200"
                    placeholder="Enter 4 digit pin" />
                <button type="button" id="btn-register" class="btn btn-primary mt-4 rounded-full">Register</button>
                <p id="login-link" class="text-lg text-neutral/90 mt-5">Already have an account? <a class="underline"
                        href="#">Login</a></p>
            </fieldset>
        </div>
    </div>

    <!-- login form  -->
    <div id="login-form" class="card bg-base-100 w-11/12 shadow mt-20 mx-auto hidden">
        <h3 class="text-lg text-neutral/90 font-bold">Login</h3>
        <div class="card-body">
            <fieldset class="fieldset">
                <label class="label text-neutral text-base font-bold">Mobile Number</label>
                <input id="login-input-number" type="text" maxlength="11" minlength="11" class="w-full input rounded-full bg-base-200" placeholder="Enter your number" />
                <br>
                <label class="label text-neutral text-base font-bold">4 digit pin</label>
                <input id="login-input-pin" type="password" maxlength="4" class="w-full input rounded-full bg-base-200" placeholder="Enter 4 digit pin" />
                <button type="button" id="btn-login" class="btn btn-primary mt-4 rounded-full">Login</button>
                <p id="register-link" class="text-lg text-neutral/90 mt-5">Don't have account? <a class="underline" href="#">Register</a></p>
            </fieldset>
        </div>
    </div>

    


    <!-- javaScript file link  -->
     
</body>
</html>
